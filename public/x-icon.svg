<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" rx="0" fill="#0a0a0f"/>

  <!-- Subtle glow -->
  <circle cx="200" cy="200" r="120" fill="#FF6B00" opacity="0.08" filter="url(#blur)"/>

  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Isometric cube - scaled and centered -->
  <g transform="translate(200, 190) scale(5)">
    <!-- Left face - dark -->
    <path
      d="M0 -16 L-14 -8 L-14 8 L0 0 Z"
      fill="white"
      opacity="0.12"
      stroke="white"
      stroke-width="1.2"
      stroke-opacity="0.4"
      stroke-linejoin="round"
    />
    <!-- Right face - lighter -->
    <path
      d="M0 -16 L14 -8 L14 8 L0 0 Z"
      fill="white"
      opacity="0.25"
      stroke="white"
      stroke-width="1.2"
      stroke-opacity="0.4"
      stroke-linejoin="round"
    />
    <!-- Bottom face - orange -->
    <path
      d="M-14 8 L0 16 L14 8 L0 0 Z"
      fill="#FF6B00"
      stroke="#FF6B00"
      stroke-width="1.2"
      stroke-opacity="0.8"
      stroke-linejoin="round"
    />
    <!-- Hex outline -->
    <path
      d="M0 -16 L14 -8 L14 8 L0 16 L-14 8 L-14 -8 Z"
      stroke="white"
      stroke-width="1.5"
      stroke-opacity="0.5"
      stroke-linejoin="round"
      fill="none"
    />
    <!-- Inner edges -->
    <line x1="0" y1="0" x2="0" y2="-16" stroke="white" stroke-width="1.2" stroke-opacity="0.35"/>
    <line x1="0" y1="0" x2="-14" y2="8" stroke="white" stroke-width="1.2" stroke-opacity="0.35"/>
    <line x1="0" y1="0" x2="14" y2="8" stroke="white" stroke-width="1.2" stroke-opacity="0.35"/>
  </g>
</svg>
