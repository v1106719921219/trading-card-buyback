<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; }
    body {
      width: 400px;
      height: 400px;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    svg { width: 260px; height: 260px; }
  </style>
</head>
<body>
  <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Left face - black -->
    <path d="M100 30 L40 65 L40 135 L100 100 Z" fill="#1a1a1a" stroke="#333" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Right face - white -->
    <path d="M100 30 L160 65 L160 135 L100 100 Z" fill="white" stroke="#333" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Bottom face - orange -->
    <path d="M40 135 L100 170 L160 135 L100 100 Z" fill="#F5921B" stroke="#333" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Outer hex outline -->
    <path d="M100 30 L160 65 L160 135 L100 170 L40 135 L40 65 Z" stroke="#222" stroke-width="3.5" stroke-linejoin="round" fill="none"/>
    <!-- Inner edges -->
    <line x1="100" y1="100" x2="100" y2="30" stroke="#333" stroke-width="2.5"/>
    <line x1="100" y1="100" x2="40" y2="135" stroke="#333" stroke-width="2.5"/>
    <line x1="100" y1="100" x2="160" y2="135" stroke="#333" stroke-width="2.5"/>
  </svg>
</body>
</html>
